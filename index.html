<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>極星咖啡 Polaris Coffee - 點餐系統</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --main-gold: #c5a059; --main-dark: #2c2c2c; }
        body { background-color: #f8f9fa; font-family: "Microsoft JhengHei", sans-serif; }
        .header { background-color: var(--main-dark); color: white; padding: 20px; text-align: center; border-bottom: 5px solid var(--main-gold); }
        .category-title { border-left: 5px solid var(--main-gold); padding-left: 10px; margin: 20px 0; color: var(--main-dark); font-weight: bold; }
        .menu-item { cursor: pointer; transition: 0.3s; border: 1px solid #ddd; background: white; }
        .menu-item:hover { background-color: #fff9ed; border-color: var(--main-gold); }
        .cart-sticky { position: sticky; top: 20px; max-height: 80vh; overflow-y: auto; }
        .badge-price { background-color: var(--main-gold); color: white; }
    </style>
</head>
<body>

<div class="header">
    <h1>極星咖啡 MENU</h1>
    <p>「在城市的微光中，找到屬於你的極星」</p>
</div>

<div class="container my-4">
    <div class="row">
        <div class="col-md-8">
            <div id="menu-container">
                </div>
        </div>

        <div class="col-md-4">
            <div class="card cart-sticky shadow-sm">
                <div class="card-header bg-dark text-white">點餐清單</div>
                <div class="card-body">
                    <ul id="cart-list" class="list-group list-group-flush mb-3">
                        <li class="list-group-item text-muted">尚未選擇餐點</li>
                    </ul>
                    <hr>
                    <div class="d-flex justify-content-between align-items-center">
                        <h5>總計</h5>
                        <h4 class="text-danger">$ <span id="total-price">0</span></h4>
                    </div>
                    <button class="btn btn-warning w-100 mt-3 fw-bold" onclick="submitOrder()">確認點餐</button>
                    <button class="btn btn-outline-secondary btn-sm w-100 mt-2" onclick="clearCart()">清空購物車</button>
                </div>
                <div class="card-footer text-muted small">
                    * 每人低消一杯飲品，目前僅收現金。
                </div>
            </div>
        </div>
    </div>
</div>

<script>
const menuData = [
    { category: "咖啡 Coffee", items: [
        { name: "義式濃縮咖啡", price: 100 },
        { name: "美式咖啡", price: 100 },
        { name: "拿鐵", price: 130 },
        { name: "摩卡咖啡", price: 150 },
        { name: "風味拿鐵 (桂花/榛果/玫瑰/香草)", price: 150 }
    ]},
    { category: "非咖啡 Non-Coffee", items: [
        { name: "巧克力麥芽牛奶", price: 130 },
        { name: "抹茶風味歐蕾", price: 130 },
        { name: "鮮奶茶", price: 130 },
        { name: "風味鮮奶茶 (桂花/榛果/玫瑰/香草)", price: 150 }
    ]},
    { category: "台灣茶飲 (熱可回沖 / 冰)", items: [
        { name: "日月潭紅玉紅茶", price: 130 },
        { name: "桂蜜蘋果紅茶", price: 140 },
        { name: "黃金蕎麥 (無咖啡因)", price: 140 },
        { name: "洛神玫瑰花茶 (無咖啡因)", price: 140 },
        { name: "檸檬紅玉紅茶 (冰)", price: 130 },
        { name: "蜂蜜紅玉紅茶 (冰)", price: 130 }
    ]},
    { category: "水果醋飲 Fruit Vinegar", items: [
        { name: "屏東九如香檬果醋", price: 140 },
        { name: "南投國姓砂糖橘醋", price: 140 },
        { name: "彰化二林黑后葡萄醋", price: 140 },
        { name: "南投埔里蜜香百香果醋", price: 140 },
        { name: "苗栗銅鑼紅肉李醋", price: 140 },
        { name: "南投信義鄉黃梅醋", price: 140 }
    ]},
    { category: "點心/甜點 Dessert", items: [
        { name: "白霜高塔肉桂捲 (2pcs)", price: 130 },
        { name: "深焙巧克力布朗尼 (2pcs)", price: 120 },
        { name: "冰火布朗尼 (加一球冰淇淋)", price: 160 },
        { name: "蜂蜜小鬆餅", price: 120 },
        { name: "薯條", price: 70 },
        { name: "雞塊 (六個)", price: 70 },
        { name: "超濃花生厚吐司", price: 70 },
        { name: "法式香蒜厚吐司", price: 70 },
        { name: "高鈣起司厚吐司", price: 70 },
        { name: "牛奶巧克力厚吐司", price: 70 }
    ]},
    { category: "PIZZA 披薩", items: [
        { name: "海鮮披薩", price: 150 },
        { name: "時蔬鮮菇披薩 (素)", price: 150 },
        { name: "夏威夷披薩", price: 150 }
    ]}
];

let cart = [];

function initMenu() {
    const container = document.getElementById('menu-container');
    menuData.forEach(cat => {
        let html = `<h3 class="category-title">${cat.category}</h3><div class="row">`;
        cat.items.forEach(item => {
            html += `
                <div class="col-6 col-md-4 mb-3">
                    <div class="card menu-item p-3 h-100 shadow-sm" onclick="addToCart('${item.name}', ${item.price})">
                        <div class="d-flex justify-content-between align-items-start">
                            <div>${item.name}</div>
                            <span class="badge badge-price">$${item.price}</span>
                        </div>
                    </div>
                </div>`;
        });
        html += `</div>`;
        container.innerHTML += html;
    });
}

function addToCart(name, price) {
    const existing = cart.find(i => i.name === name);
    if (existing) {
        existing.qty++;
    } else {
        cart.push({ name, price, qty: 1 });
    }
    renderCart();
}

function renderCart() {
    const list = document.getElementById('cart-list');
    const totalSpan = document.getElementById('total-price');
    
    if (cart.length === 0) {
        list.innerHTML = '<li class="list-group-item text-muted">尚未選擇餐點</li>';
        totalSpan.innerText = '0';
        return;
    }

    let total = 0;
    list.innerHTML = cart.map((item, index) => {
        total += item.price * item.qty;
        return `
            <li class="list-group-item d-flex justify-content-between align-items-center">
                <div>
                    <div class="fw-bold">${item.name}</div>
                    <small class="text-muted">$${item.price} x ${item.qty}</small>
                </div>
                <button class="btn btn-sm btn-outline-danger" onclick="removeItem(${index})">×</button>
            </li>`;
    }).join('');
    totalSpan.innerText = total;
}

function removeItem(index) {
    cart.splice(index, 1);
    renderCart();
}

function clearCart() {
    cart = [];
    renderCart();
}

function submitOrder() {
    if (cart.length === 0) return alert('清單是空的喔！');
    alert('訂單已送出！總金額為：$' + document.getElementById('total-price').innerText);
    clearCart();
}

initMenu();
</script>
</body>
</html>
