<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>極星咖啡 - 線上點餐</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --gold: #c5a059; --dark: #2c2c2c; }
        body { background: #f8f9fa; font-family: "Microsoft JhengHei", sans-serif; }
        .header { background: var(--dark); color: white; padding: 25px 15px; border-bottom: 5px solid var(--gold); }
        .category-header { background: #e9ecef; padding: 10px 15px; border-left: 5px solid var(--gold); margin: 20px 0 10px; font-weight: bold; color: #444; }
        .menu-card { cursor: pointer; transition: 0.2s; border: 1px solid #ddd; border-radius: 10px; background: white; }
        .menu-card:hover { transform: translateY(-3px); box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-color: var(--gold); }
        .price { color: #d9534f; font-weight: bold; }
        .cart-box { position: sticky; top: 20px; border-radius: 15px; overflow: hidden; }
    </style>
</head>
<body>

<div class="header text-center">
    <h1>極星咖啡 Polaris Coffee</h1>
    <p>「在城市的微光中，找到屬於你的極星」</p>
</div>

<div class="container my-4">
    <div class="row">
        <div class="col-md-8">
            <div id="menu-display">
                <div class="text-center py-5">菜單載入中...</div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow-sm cart-box">
                <div class="card-header bg-dark text-white fw-bold py-3">我的點餐單</div>
                <div class="card-body">
                    <ul id="cart-list" class="list-group list-group-flush mb-3">
                        <li class="list-group-item text-muted text-center py-4">尚未選擇餐點</li>
                    </ul>
                    <div class="d-flex justify-content-between align-items-center border-top pt-3">
                        <span class="h5 mb-0">總計金額</span>
                        <span class="h4 text-danger mb-0">$ <span id="total-price">0</span></span>
                    </div>
                    <button class="btn btn-warning w-100 mt-4 fw-bold py-3 shadow-sm" onclick="submitOrder()">送出訂單</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // --- 菜單數據 ---
    const menuData = [
        { category: "咖啡 Coffee", items: [
            { name: "義式濃縮咖啡", price: 100 }, { name: "美式咖啡", price: 100 },
            { name: "拿鐵", price: 130 }, { name: "摩卡咖啡", price: 150 },
            { name: "風味拿鐵 (桂花/榛果/玫瑰/香草)", price: 150 }
        ]},
        { category: "非咖啡 Non-Coffee", items: [
            { name: "巧克力麥芽牛奶", price: 130 }, { name: "抹茶風味歐蕾", price: 130 },
            { name: "鮮奶茶", price: 130 }, { name: "風味鮮奶茶 (桂花/榛果/玫瑰/香草)", price: 150 }
        ]},
        { category: "熱茶飲 Taiwan Tea", items: [
            { name: "日月潭紅玉紅茶 (熱)", price: 130 }, { name: "桂蜜蘋果紅茶 (熱)", price: 140 },
            { name: "黃金蕎麥 (無咖啡因)", price: 140 }, { name: "洛神玫瑰花茶 (無咖啡因)", price: 140 }
        ]},
        { category: "冰茶飲 Taiwan Tea", items: [
            { name: "日月潭紅玉紅茶 (冰)", price: 120 }, { name: "檸檬紅玉紅茶 (冰)", price: 130 },
            { name: "蜂蜜紅玉紅茶 (冰)", price: 130 }
        ]},
        { category: "點心/甜點 Dessert", items: [
            { name: "肉桂捲 (2pcs)", price: 130 }, { name: "布朗尼 (2pcs)", price: 120 },
            { name: "冰火布朗尼", price: 160 }, { name: "蜂蜜小鬆餅", price: 120 },
            { name: "薯條", price: 70 }, { name: "雞塊 (6個)", price: 70 },
            { name: "各類厚吐司", price: 70 }, { name: "各類披薩", price: 150 }
        ]}
    ];

    let cart = [];
    let db;

    // 初始化 Firebase (請填入你的 URL)
    try {
        const firebaseConfig = { databaseURL: "https://console.firebase.google.com/u/0/project/kfj-or/database/kfj-or-default-rtdb/data/~2F" };
        firebase.initializeApp(firebaseConfig);
        db = firebase.database();
    } catch(e) { console.error("Firebase 未連線"); }

    // 顯示選單
    function init() {
        const display = document.getElementById('menu-display');
        display.innerHTML = menuData.map(cat => `
            <div class="category-header">${cat.category}</div>
            <div class="row">
                ${cat.items.map(item => `
                    <div class="col-6 col-md-4 mb-3">
                        <div class="card menu-card h-100 p-2 shadow-sm" onclick="addToCart('${item.name}', ${item.price})">
                            <div class="fw-bold small text-dark">${item.name}</div>
                            <div class="price text-end mt-auto">$${item.price}</div>
                        </div>
                    </div>`).join('')}
            </div>
        `).join('');
    }

    function addToCart(name, price) {
        cart.push({ name, price });
        renderCart();
    }

    function renderCart() {
        const list = document.getElementById('cart-list');
        const totalSpan = document.getElementById('total-price');
        if (cart.length === 0) {
            list.innerHTML = '<li class="list-group-item text-muted text-center py-4">尚未選擇餐點</li>';
            totalSpan.innerText = '0';
            return;
        }
        let total = 0;
        list.innerHTML = cart.map((item, index) => {
            total += item.price;
            return `<li class="list-group-item d-flex justify-content-between align-items-center px-0">
                <span class="small">${item.name}</span>
                <button class="btn btn-sm btn-link text-danger p-0" onclick="removeItem(${index})">移除</button>
            </li>`;
        }).join('');
        totalSpan.innerText = total;
    }

    function removeItem(index) {
        cart.splice(index, 1);
        renderCart();
    }

    function submitOrder() {
        if (!db) return alert("系統連線錯誤，請檢查 Firebase 設定！");
        if (cart.length === 0) return alert("請先選擇餐點！");
        
        const order = {
            items: cart.map(i => i.name),
            total: document.getElementById('total-price').innerText,
            timestamp: Date.now()
        };

        db.ref('orders').push(order).then(() => {
            alert("訂單送出成功！請至櫃檯結帳。");
            cart = [];
            renderCart();
        });
    }

    init();
</script>
</body>
</html>
